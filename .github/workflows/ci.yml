name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync lock file
        run: uv sync

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Run ruff
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest || test $? -eq 5
