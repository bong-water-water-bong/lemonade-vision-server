name: qodo-merge
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (leave empty for PR event)"
        required: false
        type: string

jobs:
  qodo-merge:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Qodo Merge Review
        uses: qodo-ai/qodo-merge@v1
        env:
          QODO_API_KEY: ${{ secrets.QODO_API_KEY }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
