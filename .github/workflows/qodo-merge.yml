name: qodo-merge
on:
  workflow_dispatch:

jobs:
  qodo-merge:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Qodo Merge Review
        uses: qodo-ai/qodo-merge@v1
        env:
          QODO_API_KEY: ${{ secrets.QODO_API_KEY }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
