name: gemini-review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (leave empty for PR event)"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Gemini Flash PR review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.inputs.pr_number || github.event.pull_request.number }}"
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number provided. Skipping."
            exit 0
          fi
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV

      - name: Collect diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Cap at 50 KB — Gemini Flash has a 1 M-token context but PR diffs
          # this large are rarely useful in a review comment.
          gh pr diff "$PR_NUMBER" --repo "${{ github.repository }}" | head -c 51200 > /tmp/pr.diff

      - name: Review with Gemini Flash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, pathlib, subprocess

          api_key = os.environ["GEMINI_API_KEY"]
          diff = pathlib.Path("/tmp/pr.diff").read_text(errors="replace")

          prompt = (
              "You are a careful code reviewer. Review the following pull request diff "
              "and give concise, actionable feedback. Focus on correctness, security, "
              "test coverage, and edge cases. If there are no significant issues, say "
              "so briefly. Format your response as GitHub Markdown.\n\n"
              "```diff\n" + diff + "\n```"
          )

          payload = json.dumps({
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {"temperature": 0.2, "maxOutputTokens": 8192}
          }).encode()

          url = (
              "https://generativelanguage.googleapis.com/v1beta/models/"
              "gemini-2.5-flash:generateContent?key=" + api_key
          )
          req = urllib.request.Request(
              url, data=payload, headers={"Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req, timeout=60) as r:
              data = json.load(r)

          review = data["candidates"][0]["content"]["parts"][0]["text"]

          body = (
              "### Gemini Flash review\n\n"
              + review
              + "\n\n---\n"
              "*Automated review via gemini-review workflow*"
          )

          pr = os.environ.get("PR_NUMBER", "")
          if not pr:
              print("PR_NUMBER not set. Skipping.")
              sys.exit(0)
          repo = os.environ["REPO"]
          subprocess.run(
              ["gh", "pr", "comment", pr, "--repo", repo, "--body", body],
              check=True,
          )
          PYEOF
